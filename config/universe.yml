# Covered-call / option-income ETFs (spec §27). Analyzed with a structural
# overlay (capped upside, NAV erosion, distribution != total return), never
# recommended on distribution yield alone. `underlying` = the benchmark to
# compare total return against.
covered_call_etfs:
  - {symbol: JEPI, name: "JPMorgan Equity Premium Income",   underlying: SPY}
  - {symbol: JEPQ, name: "JPMorgan Nasdaq Equity Premium Inc", underlying: QQQ}
  - {symbol: QYLD, name: "Global X Nasdaq-100 Covered Call",  underlying: QQQ}
  - {symbol: RYLD, name: "Global X Russell 2000 Covered Call",underlying: IWM}
  - {symbol: XYLD, name: "Global X S&P 500 Covered Call",     underlying: SPY}
  - {symbol: DIVO, name: "Amplify CWP Enhanced Dividend Income", underlying: SPY}

# Benchmark map used by the accuracy/backtest engine to pick a context-appropriate
# benchmark for a recommendation.
benchmarks:
  default: SPY
  nasdaq: QQQ
  small: IWM
  mid: MDY

# Price denylist — tickers whose keyless Yahoo feed returns SYSTEMATICALLY corrupt
# prices (the whole record is uniformly inflated ~10-12x: chart price, analyst
# target_low/mean/high, AND market_cap all agree at the wrong scale, so no internal
# cross-check can catch it — e.g. "Micron @ $1,134, $1.28T market cap"; SanDisk &
# Western Digital are mis-adjusted by the 2025 WD/SanDisk spin-off). These names are
# STILL recommended (scores/thesis are price-relative and fine), but their absolute
# TARGET BAND is suppressed and flagged `data_freshness="suspect"` — never shown as a
# real prediction. Remove a ticker here once the keyless source is trustworthy again.
price_untrusted:
  - MU
  - SNDK
  - WDC

# Curated "spotlight" overlay — an EDITORIAL HOUSE WATCHLIST, NOT market data.
# Honesty note (CLAUDE.md invariant 2): these are NOT fabricated live signals.
# They are a labelled house input (the same category as a regime/policy override)
# that captures the desk's *current focus* — names drawing fresh attention
# (`heat`, 0–100) and/or carrying a high-conviction asymmetric-upside thesis
# (`conviction`, 0–100) — so the keyless-only scorers don't bury a genuinely
