  - {symbol: XLE,  yahoo_symbol: "XLE",  name: "Energy",                gics: "Energy"}
  - {symbol: XLF,  yahoo_symbol: "XLF",  name: "Financials",            gics: "Financials"}
  - {symbol: XLV,  yahoo_symbol: "XLV",  name: "Health Care",           gics: "Health Care"}
  - {symbol: XLI,  yahoo_symbol: "XLI",  name: "Industrials",           gics: "Industrials"}
  - {symbol: XLB,  yahoo_symbol: "XLB",  name: "Materials",             gics: "Materials"}
  - {symbol: XLRE, yahoo_symbol: "XLRE", name: "Real Estate",           gics: "Real Estate"}
  - {symbol: XLU,  yahoo_symbol: "XLU",  name: "Utilities",             gics: "Utilities"}

# Style / factor proxies for style-leadership classification
styles:
  - {symbol: IWF,  yahoo_symbol: "IWF",  name: "Russell 1000 Growth",  style: GROWTH}
  - {symbol: IWD,  yahoo_symbol: "IWD",  name: "Russell 1000 Value",   style: VALUE}
