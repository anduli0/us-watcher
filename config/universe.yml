# US-WATCHER instrument universe. Seeds the `instruments` table and drives the
# market-data fetch lists. `yahoo_symbol` is the symbol passed to the keyless
# Yahoo provider; `symbol` is the canonical internal id.
#
# Index levels marked `is_proxy: true` (NYSE Composite, Nasdaq Composite) are
# fetched via an explicitly-labelled tradable proxy when the raw index level is
# not keyless-available, and surfaced in the UI as PROXY — never as the index.
version: 1

indices:
  - {symbol: SPX,  yahoo_symbol: "^GSPC", name: "S&P 500",                 group: index,   market: SP500,  is_proxy: false}
  - {symbol: NDX,  yahoo_symbol: "^NDX",  name: "Nasdaq-100",              group: index,   market: NASDAQ, is_proxy: false}
  - {symbol: IXIC, yahoo_symbol: "^IXIC", name: "Nasdaq Composite",        group: index,   market: NASDAQ, is_proxy: false}
  - {symbol: DJI,  yahoo_symbol: "^DJI",  name: "Dow Jones Industrial Avg",group: index,   market: DOW,    is_proxy: false}
  - {symbol: NYA,  yahoo_symbol: "^NYA",  name: "NYSE Composite",          group: index,   market: NYSE,   is_proxy: false}
  - {symbol: RUT,  yahoo_symbol: "^RUT",  name: "Russell 2000",            group: index,   market: SMALL,  is_proxy: false}
  - {symbol: VIX,  yahoo_symbol: "^VIX",  name: "CBOE Volatility Index",   group: vol,     market: NA,     is_proxy: false}

cross_assets:
  - {symbol: US2Y, fred_series: "DGS2",   name: "US 2-Year Treasury Yield",  group: rates}
  - {symbol: US10Y,fred_series: "DGS10",  name: "US 10-Year Treasury Yield", group: rates}
  - {symbol: T10Y2Y, fred_series: "T10Y2Y", name: "10Y-2Y Spread",          group: rates}
  - {symbol: DXY,  yahoo_symbol: "DX-Y.NYB", name: "US Dollar Index",       group: fx}
  - {symbol: WTI,  yahoo_symbol: "CL=F",  name: "WTI Crude Oil",            group: commodity}
  - {symbol: GOLD, yahoo_symbol: "GC=F",  name: "Gold",                     group: commodity}
  - {symbol: BTC,  yahoo_symbol: "BTC-USD", name: "Bitcoin (risk sentiment)", group: crypto}

# Index ETFs (cap-weight vs equal-weight, breadth proxies, semis)
etfs_core:
  - {symbol: SPY, yahoo_symbol: "SPY", name: "SPDR S&P 500 ETF",            asset_type: etf, benchmark_for: SP500}
  - {symbol: RSP, yahoo_symbol: "RSP", name: "Invesco S&P 500 Equal Weight",asset_type: etf, benchmark_for: SP500_EW}
  - {symbol: QQQ, yahoo_symbol: "QQQ", name: "Invesco QQQ (Nasdaq-100)",    asset_type: etf, benchmark_for: NASDAQ}
  - {symbol: QQQE,yahoo_symbol: "QQQE",name: "Direxion NDX Equal Weight",   asset_type: etf, benchmark_for: NASDAQ_EW}
  - {symbol: DIA, yahoo_symbol: "DIA", name: "SPDR Dow Jones ETF",          asset_type: etf, benchmark_for: DOW}
  - {symbol: IWM, yahoo_symbol: "IWM", name: "iShares Russell 2000",        asset_type: etf, benchmark_for: SMALL}
  - {symbol: MDY, yahoo_symbol: "MDY", name: "SPDR S&P MidCap 400",         asset_type: etf, benchmark_for: MID}
  - {symbol: SMH, yahoo_symbol: "SMH", name: "VanEck Semiconductor ETF",    asset_type: etf, benchmark_for: SEMI}

# 11 GICS sector SPDRs
sectors:
  - {symbol: XLK,  yahoo_symbol: "XLK",  name: "Technology",            gics: "Information Technology"}
  - {symbol: XLC,  yahoo_symbol: "XLC",  name: "Communication Services",gics: "Communication Services"}
  - {symbol: XLY,  yahoo_symbol: "XLY",  name: "Consumer Discretionary",gics: "Consumer Discretionary"}
