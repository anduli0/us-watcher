name: Deploy static site to GitHub Pages

# Builds the Next.js static export from the committed snapshot
# (apps/web/public/data) and publishes it to GitHub Pages — a free CDN that
# serves the site 24/7, independent of any computer being on. The data snapshot
# is refreshed by the "Refresh snapshot" workflow (or a local publish), each
# push of which retriggers this deploy.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# GITHUB_TOKEN needs Pages write; no PAT required (same-repo deploy).
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer snapshot supersedes an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_BASE_PATH: /us-watcher # GitHub project pages serve under /<repo>

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Build static export
        working-directory: apps/web
        env:
          STATIC_EXPORT: "1"
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
