name: Refresh snapshot (cloud) & deploy

# Regenerates the data snapshot entirely in the cloud — no PC required — by
# running the deterministic pipelines against keyless live data (Yahoo / FRED /
# Google News) plus subscription-Claude prose, then builds and deploys the
# static site in the SAME job.
#
# This is what makes the site's DATA (not just its availability) independent of
# any computer being on. If a datacenter IP is rate-limited by Yahoo the run
# yields MOCK prices and BOTH the commit and the deploy are SKIPPED — the last
# good snapshot on the CDN is preserved (data-integrity invariant 2), never
# overwritten with fiction.
#
# NB: deploy is done inline here (not via deploy.yml) because a push made with
# the default GITHUB_TOKEN does not trigger other workflows' `push` events.

on:
  schedule:
    # US market cadence in KST: pre-dawn (after prior close), midday, late night.
    - cron: "20 21 * * *" # 06:20 KST
    - cron: "20 3 * * *" # 12:20 KST
    - cron: "20 13 * * *" # 22:20 KST
  workflow_dispatch:

permissions:
  contents: write # commit the refreshed snapshot back to main (history/persistence)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE_PATH: /us-watcher

jobs:
  refresh-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install package
        run: pip install -e .
      - name: Install Claude CLI (subscription prose; optional)
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate snapshot (keyless live data + prose)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MARKET_DATA_PROVIDER: yahoo
          NEWS_PROVIDER: google
        run: python -m apps.snapshot.main
      - name: Gate on real data (never publish a MOCK-heavy snapshot)
        id: check
        run: |
          live=$(python -c "import json;print(json.load(open('apps/web/public/data/meta.json')).get('live_data'))")
          echo "live_data=$live"
          if [ "$live" = "True" ]; then
            echo "live=true" >> "$GITHUB_OUTPUT"
          else
            echo "live=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Snapshot data is MOCK-heavy (datacenter IP likely rate-limited) — keeping the last good snapshot; skipping commit & deploy."
          fi
      - name: Persist snapshot to main (history)
        if: steps.check.outputs.live == 'true'
        run: |
          git config user.name "us-watcher-bot"
          git config user.email "actions@github.com"
          git add apps/web/public/data
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "snapshot: cloud refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
      - name: Build static export
        if: steps.check.outputs.live == 'true'
        working-directory: apps/web
        env:
          STATIC_EXPORT: "1"
        run: npm ci && npm run build
      - name: Upload Pages artifact
        if: steps.check.outputs.live == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out
      - name: Deploy to GitHub Pages
        if: steps.check.outputs.live == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
